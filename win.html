<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>当選結果</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, #052e16, #022c22);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .card {
      max-width: 640px;
      width: 100%;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 42px 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .badge {
      display: inline-block;
      background: #facc15;
      color: #422006;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 38px;
      line-height: 1.3;
      margin-bottom: 18px;
    }
    p {
      line-height: 1.8;
      color: rgba(255,255,255,0.86);
    }
    .box {
      background: rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 24px;
      margin: 28px 0;
    }
    .line-box {
      display: inline-block;
      background: #fff;
      padding: 12px 18px;
      border-radius: 16px;
      margin-top: 16px;
    }
    .manual {
      display: block;
      margin-top: 18px;
      color: #bbf7d0;
      text-decoration: underline;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">抽選結果</div>
    <h1>ご当選<br>おめでとうございます</h1>

    <p>
      当選者限定の案内をご確認ください。<br>
      下のLINEボタンから友だち追加をお願いします。
    </p>

    <div class="box">
      <h2>特典受け取りのご案内</h2>
      <p>LINE追加後、案内メッセージに沿ってお進みください。</p>
    </div>

    <div class="line-box">
      <a href="https://lin.ee/VjYaSYu" target="_blank" rel="noopener noreferrer">
        <img
          src="https://scdn.line-apps.com/n/line_add_friends/btn/ja.png"
          alt="友だち追加"
          height="50"
          border="0">
      </a>
    </div>

    <a class="manual" href="https://lin.ee/VjYaSYu" target="_blank" rel="noopener noreferrer">
      ボタンが押せない場合はこちら
    </a>
  </div>
</body>
</html>
